<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>einHaru Collective — Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Canonical & SEO -->
<link rel="canonical" href="https://einharu.com/" />
<meta name="description" content="einHaru Collective – minimal editorial fashion from Seoul & Tokyo, curated in Europe." />

<!-- Open Graph (Facebook, Instagram, WhatsApp, LinkedIn etc.) -->
<meta property="og:title" content="einHaru Collective — Seoul & Tokyo, selected for you." />
<meta property="og:description" content="A handpicked mix of Korean and Japanese pieces — timeless, versatile, limited runs." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://einharu.com/" />
<meta property="og:image" content="https://einharu.com/images/og-home.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<link rel="alternate" hreflang="en" href="https://www.einharu.com/" />
<link rel="alternate" hreflang="de" href="https://www.einharu.com/de/" />
<link rel="alternate" hreflang="x-default" href="https://www.einharu.com/" />


  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="favicon.ico" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <!-- Preconnect to gstatic for faster font loading -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Ovo&display=swap" rel="stylesheet" />

  <!-- Icons font (Material Symbols if you need it) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "einHaru Collective",
    "url": "https://www.einharu.com",
    "logo": "https://www.einharu.com/images/einharuheaderlogo.svg",
    "sameAs": [
      "https://www.instagram.com/einharucollective"
    ],
    "description": "einHaru Collective is an independent minimalist fashion label blending Berlin and Seoul design aesthetics."
  }
  </script>
</head>
<body>
  <!-- Site banner -->
  <div class="site-banner" role="status" aria-live="polite" id="site-banner">
    <div class="banner-text" id="banner-text">
      Free shipping within EU on orders over €100.
    </div>
    <button class="banner-close" aria-label="Dismiss banner" id="banner-close">×</button>
  </div>

  <div class="site-chrome">
    <!-- Header -->
    <header class="site-header">
      <a href="index.html" class="site-logo" aria-label="einHaru Collective">
        <img src="images/einharuheaderlogo.svg" alt="einHaru Collective logo" />
      </a>
      <div class="language-switcher" aria-label="Language switcher">
        <a href="/" class="is-active" lang="en">EN</a>
        <a href="/de/" lang="de">DE</a>
      </div>

      <div class="header-actions">
        <!-- Instagram -->
        <a class="icon-btn" href="https://www.instagram.com/einharucollective"
           target="_blank" rel="noopener" aria-label="Instagram">
          <img src="images/instaicon.svg" alt="Instagram icon" width="32" height="32" loading="lazy" />
        </a>

        <!-- Cart / Bag -->
        <button class="icon-btn" type="button" aria-label="Open bag" data-cart-open>
          <img src="images/shoppingbag.svg" alt="Shopping bag" width="32" height="32" loading="lazy" />
          <span class="badge" data-cart-count>0</span>
        </button>
      </div>
    </header>
  </div>

  <!-- Main -->
  <main class="homepage">
    <!-- Shop layout -->
    <section class="shop-layout" aria-label="Shop section">
      <aside class="shop-sidebar" aria-label="Shop category sidebar">
        <nav class="shop-category-nav" aria-label="Shop categories">
          <button type="button" class="shop-category-link is-active" data-product-type="new-arrivals" aria-pressed="true">New Arrivals</button>
          <button type="button" class="shop-category-link" data-product-type="tops" aria-pressed="false">Tops</button>
          <button type="button" class="shop-category-link" data-product-type="outerwear" aria-pressed="false">Outerwear</button>
          <button type="button" class="shop-category-link" data-product-type="dresses" aria-pressed="false">Dresses</button>
          <button type="button" class="shop-category-link" data-product-type="pants" aria-pressed="false">Pants</button>
          <button type="button" class="shop-category-link" data-product-type="skirts" aria-pressed="false">Skirts</button>
          <button type="button" class="shop-category-link" data-product-type="accessories" aria-pressed="false">Accessories</button>
          <button type="button" class="shop-category-link" data-product-type="vintage" aria-pressed="false">Vintage</button>
        </nav>
      </aside>

      <div class="shop-main">
        <a class="coming-soon-banner" href="coming-soon.html" aria-label="Go to coming soon page">
          <span class="coming-soon-collage" aria-hidden="true">
            <span class="coming-soon-collage__tile coming-soon-collage__tile--a">
              <img src="images/comingsoon08.webp" alt="" loading="lazy" />
            </span>
            <span class="coming-soon-collage__tile coming-soon-collage__tile--b">
              <img src="images/comingsoon05.webp" alt="" loading="lazy" />
            </span>
          </span>
          <span class="coming-soon-banner-copy">
            <strong>Coming Soon</strong>
          </span>
        </a>

        <section class="shop-main-controls" aria-label="Shop header controls">
          <div class="shop-header-right">
            <label for="sort-products" class="shop-sort-label">Sort</label>
            <select id="sort-products" class="shop-sort" aria-label="Sort products">
              <option value="featured">Featured</option>
              <option value="availability">Availability (In Stock First)</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="name-asc">Name: A to Z</option>
            </select>

            <div class="shop-view-toggle" role="group" aria-label="Product view">
              <button type="button" class="view-toggle-btn is-active" data-view-toggle="grid" aria-pressed="true">Grid</button>
              <button type="button" class="view-toggle-btn" data-view-toggle="list" aria-pressed="false">List</button>
            </div>
          </div>
        </section>

        <!-- Product grid (filled by JS) -->
        <section class="product-grid" id="product-grid" aria-label="Product grid">
          <!-- Cards injected by script.js -->
        </section>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer" aria-label="Site footer">
    <div class="site-footer-main">
      <a href="index.html" class="site-footer-brand" aria-label="einHaru Collective home">einHaru Collective</a>
      <nav class="site-footer-nav" aria-label="Footer links">
        <a href="about.html">About</a>
        <a href="editorial.html">Editorial</a>
        <a href="faq.html">FAQ</a>
        <a href="returns.html">Returns</a>
        <a href="privacy.html">Privacy</a>
        <a href="https://www.instagram.com/einharucollective" target="_blank" rel="noopener" aria-label="einHaru Instagram">Instagram</a>
      </nav>
    </div>
  </footer>
  <section class="cookie-bar" aria-label="Cookie notice">
    <p>
      We use cookies to enhance your experience. By continuing to browse, you agree to our
      <a href="privacy.html#cookies">Cookie Policy</a> and <a href="privacy.html">Privacy Policy</a>.
    </p>
    <div class="cookie-bar-actions">
      <button type="button" class="cookie-btn cookie-btn--ghost">Decline</button>
      <button type="button" class="cookie-btn">Accept</button>
    </div>
  </section>

  <!-- Mini-cart drawer + overlay -->
  <div class="cart-overlay" data-cart-overlay hidden></div>
  <aside class="cart-drawer" data-cart-drawer hidden aria-hidden="true" aria-label="Shopping bag" role="dialog">
    <header class="cart-drawer__header">
      <h2>Bag</h2>
      <button class="cart-close" aria-label="Close bag" data-cart-close>&times;</button>
    </header>
    <div class="cart-drawer__list" data-cart-list></div>
    <footer class="cart-drawer__footer">
      <div class="cart-subtotal">
        <span>Subtotal</span>
        <strong data-cart-subtotal>€0</strong>
      </div>
      <div class="cart-promo">
  <label for="cart-promo-input" class="visually-hidden">Promo code</label>
  <input id="cart-promo-input" data-cart-promo-input placeholder="Promo code" autocomplete="off" class="promo-input">
  <a href="#" data-cart-apply-promo class="promo-apply-link" role="button" aria-label="Apply promo code">Apply</a>

  <div class="promo-note" data-cart-promo-note hidden>
    Applied: <strong data-cart-promo-code></strong>
    <button type="button" data-cart-remove-promo class="promo-remove">Remove</button>
  </div>
</div>

      <button class="button-primary" data-cart-checkout>Go to checkout</button>
      <button class="button-secondary" data-cart-continue>Continue shopping</button>
    </footer>
  </aside>

  <!-- Scripts: order matters -->
  <script>
    // keep year current
    document.addEventListener('DOMContentLoaded', () => {
      const y = document.getElementById('year2');
      if (y) y.textContent = new Date().getFullYear();
    });
  </script>
  <script>
  window.EH_BACKEND = location.origin;
</script>
  <script src="cart.js" defer></script>
  <script src="script.js" defer></script>
  <script src="cookie-consent.js" defer></script>
</body>
</html>
