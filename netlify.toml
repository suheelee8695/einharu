# netlify.toml

[build]
  publish = "."
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!*.md' ':!.gitignore' ':!.DS_Store' ':!deno.lock' ':!scripts/' ':!*.yml'"

[context.production]
  publish = "."

[context.branch-deploy]
  ignore = "exit 0"

[context.deploy-preview]
  ignore = "exit 0"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  function = "product-meta"
  path = "/:slug"

