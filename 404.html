<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found — einHaru Collective</title>
  <meta name="description" content="The page you are looking for could not be found." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo" aria-label="einHaru Collective home">
      <img src="/images/einharuheaderlogo.svg" alt="einHaru Collective logo" />
    </a>
    <div class="header-actions">
      <a class="icon-btn" href="https://www.instagram.com/einharucollective" target="_blank" rel="noopener" aria-label="Instagram">
        <img src="/images/instaicon.svg" alt="Instagram icon" width="32" height="32" loading="lazy" />
      </a>
    </div>
  </header>

  <main class="status-page">
    <div class="status-wrap">
      <div class="status-eyebrow">404</div>
      <h1 class="status-title">Page not found.</h1>
      <p class="status-desc">The URL may be outdated, moved, or unavailable.</p>
      <div class="status-actions">
        <a href="/" class="button-primary">Back to shop</a>
      </div>
    </div>
  </main>
</body>
</html>
