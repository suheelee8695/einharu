name: Sync Inventory to Notion

on:
  schedule:
    # Runs every night at 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab — useful for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: ./scripts

      - name: Run inventory sync
        env:
          NETLIFY_PRODUCTS_URL: ${{ secrets.NETLIFY_PRODUCTS_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node sync-inventory.js
        working-directory: ./scripts
